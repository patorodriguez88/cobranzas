<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Cobranzas | Productos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="shortcut icon" href="img/favicon.png" />

    <!-- Datatables -->
    <link href="saas/assets/css/vendor/dataTables.bootstrap5.css" rel="stylesheet" />
    <link href="saas/assets/css/vendor/responsive.bootstrap5.css" rel="stylesheet" />

    <!-- App -->
    <link href="saas/assets/css/icons.min.css" rel="stylesheet" />
    <link href="saas/assets/css/app.min.css" rel="stylesheet" id="app-style" />
  </head>

  <body class="loading" data-layout-color="light" data-leftbar-theme="dark">
    <div class="wrapper">
      <!-- SIDEBAR -->
      <div class="leftside-menu">
        <a href="pendientes.html" class="logo text-center logo-light">
          <span class="logo-lg bg-light">
            <img src="images/dinterDark.png" height="36" />
          </span>
          <span class="logo-sm bg-white">
            <img src="img/icon_64.png" height="36" />
          </span>
        </a>

        <div class="h-100 bg-light" data-simplebar>
          <ul class="side-nav">
            <li class="side-nav-title">Datos</li>

            <li class="side-nav-item">
              <a href="Clientes.html" class="side-nav-link">
                <i class="mdi mdi-account"></i>
                <span>Clientes</span>
              </a>
            </li>

            <li class="side-nav-item">
              <a href="productos_ventas.html" class="side-nav-link active">
                <i class="mdi mdi-package-variant text-dark"></i>
                <span class="text-dark">Productos</span>
              </a>
            </li>

            <li class="side-nav-title">Ventas</li>

            <li class="side-nav-item">
              <a href="productos_ventas.html#dashboard" class="side-nav-link">
                <i class="mdi mdi-view-dashboard-outline"></i>
                <span>Dashboard</span>
              </a>
            </li>

            <li class="side-nav-item">
              <a href="ventas.html#ventas" class="side-nav-link">
                <i class="mdi mdi-cart-plus"></i>
                <span>Nueva Venta</span>
              </a>
            </li>

            <li class="side-nav-item">
              <a href="ventas.html#listado_ventas" class="side-nav-link">
                <i class="mdi mdi-format-list-bulleted"></i>
                <span>Ventas</span>
              </a>
            </li>

            <li class="side-nav-title">Admin</li>

            <li class="side-nav-item">
              <a href="pendientes.html" class="side-nav-link">
                <i class="mdi mdi-archive-cancel-outline"></i>
                <span>Pendientes</span>
              </a>
            </li>

            <li class="side-nav-item">
              <a href="conciliados.html" class="side-nav-link">
                <i class="mdi mdi-archive-check-outline"></i>
                <span>Conciliados</span>
              </a>
            </li>
          </ul>
        </div>
      </div>

      <!-- CONTENIDO -->
      <div class="content-page">
        <div class="content">
          <!-- TOPBAR -->
          <div class="navbar-custom">
            <button class="button-menu-mobile open-left">
              <i class="mdi mdi-menu"></i>
            </button>
          </div>

          <div class="container-fluid">
            <!-- TITULO -->
            <div class="row">
              <div class="col-12">
                <div class="page-title-box">
                  <h4 class="page-title">Gestión de Productos</h4>
                </div>
              </div>
            </div>

            <div class="row">
              <!-- FORM -->
              <div class="col-md-4">
                <div class="card">
                  <div class="card-body">
                    <h5 class="mb-3">Producto</h5>

                    <input type="hidden" id="producto_id" value="0" />

                    <div class="mb-2">
                      <label>Código</label>
                      <input type="text" id="producto_codigo" class="form-control" />
                    </div>

                    <div class="mb-2">
                      <label>Nombre</label>
                      <input type="text" id="producto_nombre" class="form-control" />
                    </div>

                    <div class="mb-2">
                      <label>Categoría</label>
                      <input type="text" id="producto_categoria" class="form-control" />
                    </div>

                    <div class="mb-2">
                      <label>Costo</label>
                      <input type="number" id="producto_costo" class="form-control" />
                    </div>

                    <div class="mb-2">
                      <label>Precio Venta</label>
                      <input type="number" id="producto_venta" class="form-control" />
                    </div>

                    <div class="mb-2">
                      <label>Stock</label>
                      <input type="number" id="producto_stock" class="form-control" />
                    </div>

                    <div class="mb-2">
                      <label>Descripción</label>
                      <textarea id="producto_descripcion" class="form-control"></textarea>
                    </div>

                    <div class="text-end mt-3">
                      <button id="btn_cancelar_producto" class="btn btn-danger">Cancelar</button>
                      <button id="btn_guardar_producto" class="btn btn-success">Guardar</button>
                    </div>
                  </div>
                </div>
              </div>

              <!-- TABLA -->
              <div class="col-md-8">
                <div class="card">
                  <div class="card-body">
                    <h5 class="mb-3">Listado de Productos</h5>

                    <table id="tabla_productos" class="table table-striped dt-responsive w-100">
                      <thead>
                        <tr>
                          <th>Código</th>
                          <th>Nombre</th>
                          <th>Categoría</th>
                          <th>Costo</th>
                          <th>Venta</th>
                          <th>Stock</th>
                          <th>Estado</th>
                          <th>Acciones</th>
                        </tr>
                      </thead>
                      <tbody></tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- FOOTER -->
        <footer class="footer text-center">© Dinter</footer>
      </div>
    </div>

    <!-- JS -->
    <script src="saas/assets/js/vendor.min.js"></script>
    <script src="saas/assets/js/app.min.js"></script>

    <script src="saas/assets/js/vendor/jquery.dataTables.min.js"></script>
    <script src="saas/assets/js/vendor/dataTables.bootstrap5.js"></script>
    <script src="saas/assets/js/vendor/dataTables.responsive.min.js"></script>

    <script src="control/procesos/js/productos.js"></script>
    <script src="control/procesos/js/ventas.js"></script>
  </body>
</html>
